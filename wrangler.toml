# Cloudflare Pages + Functions config
# After you create the D1 database, paste its id into database_id below.
name = "cc"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

# D1 binding — the Functions read this as env.DB
[[d1_databases]]
binding = "DB"
database_name = "cc-db"
database_id = "07f3d742-77a0-4918-b5a1-eeb6fe0652d1"

# Secrets (DO NOT put real values here — set them in the dashboard or with wrangler):
#   npx wrangler pages secret put ADMIN_PASSWORD
#   npx wrangler pages secret put SESSION_SECRET
# ADMIN_PASSWORD  = the admin login password
# SESSION_SECRET  = any long random string used to sign the login cookie
